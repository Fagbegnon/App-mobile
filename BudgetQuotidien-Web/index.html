<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Budget Quotidien</title>
  <meta name="description" content="Combien puis-je encore dépenser aujourd'hui ?" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2FB574" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0E0F12" media="(prefers-color-scheme: dark)" />

  <!-- iOS : mode plein écran + icône écran d'accueil -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Barre d'onglets -->
  <nav id="tabbar" class="tabbar hidden">
    <button class="tab" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      <span>Accueil</span>
    </button>
    <button class="tab" data-tab="history">
      <svg viewBox="0 0 24 24"><path d="M4 5h16v3H4zM4 10.5h16v3H4zM4 16h10v3H4z"/></svg>
      <span>Dépenses</span>
    </button>
    <button class="tab tab-add" data-action="add-expense" aria-label="Ajouter">
      <span class="fab">+</span>
    </button>
    <button class="tab" data-tab="budget">
      <svg viewBox="0 0 24 24"><path d="M4 20V10h4v10zm6 0V4h4v16zm6 0v-7h4v7z"/></svg>
      <span>Budget</span>
    </button>
    <button class="tab" data-tab="profile">
      <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10m0 2c-5 0-9 2.5-9 6v2h18v-2c0-3.5-4-6-9-6"/></svg>
      <span>Profil</span>
    </button>
  </nav>

  <!-- Conteneur des fenêtres modales -->
  <div id="modal-root"></div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
